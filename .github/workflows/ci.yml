name: Docker Build
on: 
  push: 
    branches: 
      - dev

jobs:
  docker: 
    runs-on: ubuntu-latest
    environment: UAT
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker Image
        run: docker build -t lyheng/smart-laundry-web:${{ github.sha }} .

      - name: Push Docker Image
        run: docker push lyheng/smart-laundry-web:${{ github.sha }}

      - name: Notify Success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELE_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELE_CHAT_ID }} \
          -d text="✅ Build succeeded"