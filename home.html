<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SmartWash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 font-sans">

    <div class="max-w-md w-full">
        <a href="index.html" class="inline-flex items-center text-slate-400 hover:text-blue-600 transition mb-8 group">
            <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i>
            <span class="text-sm font-bold">Back to Marketplace</span>
        </a>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-blue-100/50 border border-slate-100 overflow-hidden">
            
            <div class="p-10 text-center bg-white border-b border-slate-50">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                    <i class="fas fa-wind text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Welcome Back</h1>
                <p class="text-slate-400 text-sm mt-1 font-medium">Please enter your credentials to continue</p>
            </div>

            <div class="px-10 pt-8">
                <div class="bg-slate-100 p-1 rounded-2xl flex">
                    <button class="flex-1 py-2.5 text-xs font-bold rounded-xl bg-white text-blue-600 shadow-sm transition-all" onclick="setRole('Customer')">Customer</button>
                    <button class="flex-1 py-2.5 text-xs font-bold rounded-xl text-slate-500 hover:text-slate-700 transition-all" onclick="setRole('Shop Owner')">Shop Owner</button>
                    <button class="flex-1 py-2.5 text-xs font-bold rounded-xl text-slate-500 hover:text-slate-700 transition-all" onclick="setRole('Driver')">Driver</button>
                </div>
            </div>

            <div class="p-10">
                <form action="#" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Email Address</label>
                        <div class="relative">
                            <i class="far fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="email" placeholder="john@university.edu" 
                                class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-slate-700">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-center ml-1">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider">Password</label>
                            <a href="#" class="text-xs font-bold text-blue-600 hover:underline">Forgot?</a>
                        </div>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" placeholder="••••••••" 
                                class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-slate-700">
                        </div>
                    </div>

                    <div class="flex items-center gap-2 ml-1">
                        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                        <label for="remember" class="text-sm text-slate-500 font-medium cursor-pointer">Remember this device</label>
                    </div>

                    <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-lg hover:bg-blue-600 hover:shadow-xl hover:shadow-blue-200 transition-all flex items-center justify-center gap-3">
                        Sign In
                        <i class="fas fa-arrow-right text-sm"></i>
                    </button>
                </form>

                <div class="mt-10 text-center">
                    <p class="text-slate-500 text-sm font-medium">
                        New to SmartWash? 
                        <a href="#" class="text-blue-600 font-bold ml-1 hover:underline">Create an Account</a>
                    </p>
                </div>
            </div>

            <div class="bg-slate-50 p-5 text-center border-t border-slate-100">
                <a href="#" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-600 transition">
                    System Admin Login
                </a>
            </div>
        </div>
        
        <p class="text-center mt-8 text-slate-400 text-xs">
            Protected by SmartWash Security &bull; &copy; 2026
        </p>
    </div>

    <script>
        function setRole(role) {
            // This is where you would handle role-based logic for your assignment
            console.log("Role selected: " + role);
        }
    </script>

</body>
</html>
