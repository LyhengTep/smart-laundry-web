services:
  web:
    container_name: smart-laundry-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://smart-laundry.lyhengtep.com/api/v1}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://smart-laundry.lyhengtep.com}
    image: lyheng/smart-laundry-web:0.0.1-dev.5
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://smart-laundry.lyhengtep.com/api/v1}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://smart-laundry.lyhengtep.com}
    restart: unless-stopped
